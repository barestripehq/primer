[package]
name = "motionstream"
version = "0.1.0"
edition = "2024"
description = "Pre-install security interceptor for package managers"

[[bin]]
name = "motionstream"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"

[dev-dependencies]
mockito = "1"
tokio = { version = "1", features = ["full"] }
